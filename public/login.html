<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Twin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      max-width: 480px;
      margin: 4rem auto;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow-lg);
    }
    .auth-tabs {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      border-bottom: 1px solid var(--border-glass);
      padding-bottom: var(--space-sm);
    }
    .auth-tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: var(--font-size-md);
      font-weight: 600;
      cursor: pointer;
      padding: var(--space-sm) var(--space-md);
      transition: color var(--transition-base);
    }
    .auth-tab.active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--health-good);
    }
    .auth-tab:hover {
      color: var(--text-secondary);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: var(--space-lg);
    }
    .form-group label {
      display: block;
      margin-bottom: var(--space-xs);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: var(--font-size-md);
      transition: border-color var(--transition-base);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-sleep);
    }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      color: white;
      border: none;
      padding: var(--space-md);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-md);
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🧬</span>
        <h1>Digital Twin</h1>
      </div>
      <span class="header-subtitle">Health Activity Tracker</span>
    </div>
  </header>

  <main class="main">
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabSignup">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-submit">
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" required placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label for="signupAge">Age (Optional)</label>
          <input type="number" id="signupAge" min="1" max="150" placeholder="e.g. 25">
        </div>
        <button type="submit" class="btn-submit">
          <span class="btn-text">Create Account</span>
        </button>
      </form>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
